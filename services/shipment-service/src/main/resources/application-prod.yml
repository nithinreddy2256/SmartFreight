# ─── PRODUCTION ENVIRONMENT OVERRIDES ────────────────────────────────────────
# Applied when spring.profiles.active=prod

spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    show-sql: false

management:
  cloudwatch:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: WARN
    com.smartfreight: INFO
