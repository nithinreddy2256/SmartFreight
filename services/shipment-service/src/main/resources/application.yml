server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: shipment-service

  # ─── JPA / Datasource ─────────────────────────────────────────────────────
  datasource:
    # URL resolved from environment variable (set by ECS task definition)
    # In dev/test: set DATABASE_URL in docker-compose.yml
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/shipment_db}
    username: ${DATABASE_USERNAME:shipment_svc}
    password: ${DATABASE_PASSWORD:localpassword}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      pool-name: ShipmentServicePool

  jpa:
    hibernate:
      ddl-auto: validate  # Flyway manages schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        jdbc:
          batch_size: 25
          order_inserts: true
          order_updates: true

  # ─── Flyway ─────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

  # ─── Security / OAuth2 ────────────────────────────────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          # Cognito issuer URI — must match the 'iss' claim in JWTs
          # Format: https://cognito-idp.{region}.amazonaws.com/{userPoolId}
          issuer-uri: ${COGNITO_ISSUER_URI:https://cognito-idp.us-east-1.amazonaws.com/local}

# ─── AWS ────────────────────────────────────────────────────────────────────
aws:
  region: ${AWS_REGION:us-east-1}
  # For local development with LocalStack: http://localhost:4566
  endpoint-url: ${AWS_ENDPOINT_URL:#{null}}
  sns:
    shipment-events-topic-arn: ${SHIPMENT_EVENTS_TOPIC_ARN:arn:aws:sns:us-east-1:000000000000:shipment-events}
  sqs:
    shipment-inbound-queue-url: ${SHIPMENT_INBOUND_QUEUE_URL:http://localhost:4566/000000000000/shipment-inbound-queue}

# ─── Resilience4j ────────────────────────────────────────────────────────────
resilience4j:
  retry:
    instances:
      sns-publish:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - software.amazon.awssdk.services.sns.model.SnsException
      carrier-service:
        max-attempts: 3
        wait-duration: 1s
  circuitbreaker:
    instances:
      carrier-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s

# ─── Actuator ────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    db:
      enabled: true
  # CloudWatch metrics export — disabled locally, enabled in dev/test/prod
  cloudwatch:
    metrics:
      export:
        enabled: ${CLOUDWATCH_METRICS_ENABLED:false}

# ─── Springdoc / OpenAPI ──────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  info:
    title: SmartFreight Shipment Service API
    version: 1.0.0
    description: Manages shipment lifecycle and tracking

# ─── Shipment-specific settings ──────────────────────────────────────────────
shipment:
  reference:
    prefix: SF

# ─── Logging ─────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.smartfreight: DEBUG
    org.springframework.security: WARN
